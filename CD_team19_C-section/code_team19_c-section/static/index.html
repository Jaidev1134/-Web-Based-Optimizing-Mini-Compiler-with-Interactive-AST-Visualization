<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mini-Compiler Studio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/monokai.min.css">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dagre-d3/0.6.4/dagre-d3.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <!-- Use javascript mode for general C-style syntax highlighting -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom">
      <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="#">Mini-Compiler Studio</a>
        <div class="ms-auto text-secondary small">
            Powered by Python PLY
        </div>
      </div>
    </nav>

    <main class="container-fluid py-3">
        <div class="row g-3">
            
            <!-- Left Panel: Code Editor -->
            <div class="col-lg-4 d-flex flex-column">
                <div class="card shadow-sm flex-grow-1">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h6 class="mb-0">Source Code</h6>
                        <div class="d-flex align-items-center gap-2">
                            <div class="input-group input-group-sm" style="width: 140px;">
                                <span class="input-group-text bg-dark text-light border-secondary">K-Regs</span>
                                <input type="number" class="form-control bg-dark text-light border-secondary text-center" id="kregsInput" value="4" min="1" max="32">
                            </div>
                            <button id="compileBtn" class="btn btn-sm btn-primary">Compile</button>
                        </div>
                    </div>
                    <div class="card-body p-0">
                        <textarea id="editorTextarea">
// Example Code
a = 10;
b = a * 2;
if (b > 15) {
    c = sin(3.14);
} else {
    c = 0;
}
while (a > 0) {
    a = a - 1;
}
</textarea>
                    </div>
                    <div class="card-footer p-2">
                        <div id="errorBox" class="alert alert-danger m-0 d-none p-2 small"></div>
                    </div>
                </div>
            </div>

            <!-- Right Panel: Outputs -->
            <div class="col-lg-8">
                <div class="card shadow-sm h-100">
                    <div class="card-header p-2 pb-0 border-bottom-0">
                        <ul class="nav nav-tabs border-bottom-0" id="compilerTabs" role="tablist">
                            <li class="nav-item" role="presentation">
                                <button class="nav-link active" id="cfg-tab" data-bs-toggle="tab" data-bs-target="#cfg-pane" type="button" role="tab">Control Flow Graph</button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link" id="tree-tab" data-bs-toggle="tab" data-bs-target="#tree-pane" type="button" role="tab">AST Viewer</button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link" id="tac-tab" data-bs-toggle="tab" data-bs-target="#tac-pane" type="button" role="tab">Three-Address Code</button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link" id="asm-tab" data-bs-toggle="tab" data-bs-target="#asm-pane" type="button" role="tab">Assembly (MIPS)</button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link" id="memory-tab" data-bs-toggle="tab" data-bs-target="#memory-pane" type="button" role="tab">Symbol Table (Memory)</button>
                            </li>
                        </ul>
                    </div>
                    <div class="card-body p-0 border-top tab-content" id="myTabContent" style="height: 600px; overflow-y: auto;">
                        
                        <!-- CFG Pane -->
                        <div class="tab-pane fade show active h-100 position-relative" id="cfg-pane" role="tabpanel" tabindex="0">
                            <div class="position-absolute top-0 end-0 p-2" style="z-index: 10;">
                                <button class="btn btn-sm btn-outline-light" id="exportCfgBtn">📸 PNG</button>
                            </div>
                            <svg id="cfg-svg" width="100%" height="100%" class="bg-black"><g/></svg>
                        </div>
                        
                        <!-- Tree Pane -->
                        <div class="tab-pane fade h-100 position-relative" id="tree-pane" role="tabpanel" tabindex="0">
                            <div class="position-absolute top-0 end-0 p-2" style="z-index: 10;">
                                <button class="btn btn-sm btn-outline-light" id="exportTreeBtn">📸 PNG</button>
                            </div>
                            <div id="chart" class="w-100 h-100 bg-black" style="overflow-x: scroll; overflow-y: auto; display: block;"></div>
                        </div>

                        <!-- TAC Pane -->
                        <div class="tab-pane fade h-100 p-3" id="tac-pane" role="tabpanel" tabindex="0">
                            <div class="d-flex justify-content-end mb-2">
                                <button class="btn btn-sm btn-outline-light" id="exportTacBtn">💾 Save TAC</button>
                            </div>
                            <div class="row">
                                <div class="col-6">
                                    <h6 class="text-secondary small">Raw TAC</h6>
                                    <pre id="rawTac" class="form-control bg-body-secondary border-0" style="height: 500px; overflow-y: auto;">—</pre>
                                </div>
                                <div class="col-6">
                                    <h6 class="text-success small">Optimized TAC (Constant Folding)</h6>
                                    <pre id="optTac" class="form-control bg-body-secondary border-0" style="height: 500px; overflow-y: auto;">—</pre>
                                </div>
                            </div>
                        </div>

                        <!-- Assembly Pane -->
                        <div class="tab-pane fade h-100 p-3" id="asm-pane" role="tabpanel" tabindex="0">
                            <div class="d-flex justify-content-end mb-2">
                                <button class="btn btn-sm btn-outline-light" id="exportAsmBtn">💾 Save ASM</button>
                            </div>
                            <pre id="asmViewer" class="form-control bg-body-secondary border-0 h-100 font-monospace text-warning p-3">—</pre>
                        </div>

                        <!-- Symbol Table Pane -->
                        <div class="tab-pane fade h-100 p-3" id="memory-pane" role="tabpanel" tabindex="0">
                            <table class="table table-dark table-striped table-hover mt-2">
                                <thead>
                                    <tr>
                                        <th>Identifier</th>
                                        <th>Data Type</th>
                                        <th>Final Value (Trace)</th>
                                    </tr>
                                </thead>
                                <tbody id="symbolTableBody">
                                    <tr><td colspan="3" class="text-center text-muted">Awaiting Compilation...</td></tr>
                                </tbody>
                            </table>
                        </div>

                    </div>
                </div>
            </div>

        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/script.js"></script>
  </body>
</html>
